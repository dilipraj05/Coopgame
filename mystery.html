<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
  <title>The Ciphered Truth - 2 Player Mystery</title>
  <script src="https://unpkg.com/peerjs@1.5.1/dist/peerjs.min.js"></script>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    body {
      font-family: 'Segoe UI', 'Roboto', system-ui, sans-serif;
      background: radial-gradient(circle at 20% 20%, #1a1a2e, #0f0f1a);
      color: #e0d7c6;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 15px;
      margin: 0;
      overflow-x: hidden;
    }
    .main-container {
      max-width: 500px;
      width: 100%;
      background: rgba(20, 20, 30, 0.9);
      backdrop-filter: blur(15px);
      border-radius: 24px;
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.7), 0 0 30px rgba(212, 175, 55, 0.3);
      padding: 20px;
      border: 1px solid rgba(212, 175, 55, 0.25);
      transition: all 0.4s ease;
      animation: fadeSlideIn 0.6s ease-out;
    }
    @keyframes fadeSlideIn {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* header */
    h1 {
      font-family: 'Courier New', monospace;
      color: #d4af37;
      text-align: center;
      font-size: 2rem;
      letter-spacing: 2px;
      text-shadow: 0 0 15px #d4af37aa;
      margin-bottom: 5px;
    }
    .subtitle {
      text-align: center;
      font-style: italic;
      color: #a89b7c;
      margin-bottom: 20px;
      font-size: 0.9rem;
    }

    /* badges and status */
    .role-badge {
      display: inline-block;
      background: linear-gradient(135deg, #d4af37, #b8960c);
      color: #0a0a0a;
      padding: 6px 18px;
      border-radius: 30px;
      font-weight: bold;
      font-size: 0.9rem;
      letter-spacing: 0.5px;
      margin-bottom: 15px;
      box-shadow: 0 4px 12px rgba(212, 175, 55, 0.4);
    }

    .status-pill {
      background: #2a2a35;
      padding: 8px 15px;
      border-radius: 20px;
      font-size: 0.85rem;
      color: #ccc;
      margin: 10px 0;
      text-align: center;
      border: 1px solid #444;
    }
    .connected { border-color: #4caf50; color: #8bc34a; }
    .waiting { border-color: #d4af37; color: #d4af37; animation: pulseGlow 2s infinite; }
    @keyframes pulseGlow {
      0%, 100% { box-shadow: 0 0 8px #d4af3766; }
      50% { box-shadow: 0 0 18px #d4af37; }
    }

    /* input/buttons */
    input, button {
      width: 100%;
      padding: 14px;
      margin: 8px 0;
      border-radius: 12px;
      border: none;
      font-size: 1rem;
      font-weight: 500;
      transition: all 0.2s ease;
    }
    input {
      background: #2c2c3a;
      color: #fff;
      border: 1px solid #444;
    }
    input:focus {
      outline: none;
      border-color: #d4af37;
      box-shadow: 0 0 12px #d4af3780;
    }
    button {
      background: linear-gradient(145deg, #d4af37, #b38b2c);
      color: #0f0f0f;
      font-weight: bold;
      cursor: pointer;
      text-transform: uppercase;
      letter-spacing: 1px;
      box-shadow: 0 6px 14px rgba(212, 175, 55, 0.3);
      border: 1px solid #f1c40f44;
    }
    button:active { transform: scale(0.97); }
    button:disabled {
      background: #3a3a4a;
      color: #777;
      box-shadow: none;
      border-color: #555;
      cursor: not-allowed;
    }

    /* clue cards */
    .clue-card {
      background: rgba(30, 30, 42, 0.8);
      border-left: 5px solid #d4af37;
      padding: 12px 15px;
      margin: 12px 0;
      border-radius: 8px;
      backdrop-filter: blur(5px);
      animation: fadeIn 0.4s ease;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateX(-10px); }
      to { opacity: 1; transform: translateX(0); }
    }
    .chapter-title {
      color: #d4af37;
      font-weight: bold;
      margin-top: 20px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    .result-message {
      font-weight: bold;
      padding: 8px;
      border-radius: 8px;
      margin: 10px 0;
      text-align: center;
    }
    .success-message { color: #9bff9b; background: #1e3a1e; }
    .error-message { color: #ff8a8a; background: #3a1e1e; }
    .victory {
      background: linear-gradient(145deg, #1e3a1e, #0f2b0f);
      font-size: 1.4rem;
      padding: 20px;
      border: 2px solid #d4af37;
      border-radius: 16px;
      text-shadow: 0 0 10px #d4af37;
      animation: confettiPulse 0.8s ease-in-out;
    }
    @keyframes confettiPulse {
      0% { transform: scale(0.95); }
      50% { transform: scale(1.03); background: #2a4a2a; }
      100% { transform: scale(1); }
    }
    .confetti {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 999;
    }
    .confetti-piece {
      position: absolute;
      width: 10px;
      height: 10px;
      background: #f1c40f;
      animation: fall linear forwards;
    }
    @keyframes fall {
      to { transform: translateY(100vh) rotate(720deg); opacity: 0; }
    }

    .hidden { display: none !important; }
  </style>
</head>
<body>
  <div class="main-container" id="app">
    <h1>🔎 CIPHERED TRUTH</h1>
    <div class="subtitle">2‑player co‑op mystery</div>

    <!-- Lobby / Connection Screen -->
    <div id="lobbyScreen">
      <button id="createRoomBtn" style="font-size:1.1rem;">🔐 Create Room</button>
      <div id="roomIdBox" class="status-pill hidden" style="margin:15px 0; background:#1e1e2a;">
        Room ID: <span id="roomIdText" style="color:#d4af37; font-weight:bold;"></span>
        <br><small style="color:#aaa;">Share this with your partner</small>
      </div>
      <div style="display:flex; gap:10px; margin:15px 0;">
        <input type="text" id="joinInput" placeholder="Paste Room ID" style="flex:2;">
        <button id="joinRoomBtn" style="flex:1;">Join</button>
      </div>
      <div id="connectionStatus" class="status-pill">Waiting to connect...</div>
    </div>

    <!-- Game Screen (hidden until paired) -->
    <div id="gameScreen" class="hidden">
      <div class="role-badge" id="roleLabel"></div>
      <div class="status-pill" id="partnerConnectionPill">Partner connected</div>
      <div id="clueArea">
        <div class="chapter-title" id="chapterDisplay"></div>
        <div id="cluesList"></div>
        <div id="puzzleQuestion"></div>
      </div>
      <input type="text" id="answerInput" placeholder="Enter your combined answer..." autocomplete="off">
      <button id="submitAnswerBtn">🔓 Unlock</button>
      <div id="resultDisplay" class="result-message"></div>
    </div>
  </div>

  <script>
    (function() {
      // ---- Game Data ----
      const ROLE_DETECTIVE = "detective";
      const ROLE_ANALYST = "analyst";

      const chapters = [
        {
          title: "CHAPTER I: The Missing Key",
          detective: {
            clue: "Desk drawer has a keyhole with a symbol: ♆ (Neptune). A sticky note: 'Planet order from sun'.",
            partial: "You need the planet’s position number."
          },
          analyst: {
            clue: "Orrery database shows Neptune is the 8th planet.",
            partial: "Combine to form a 2-digit code."
          },
          question: "Enter the 2‑digit key code:",
          answer: "08" // 8th planet, pad to 2 digits
        },
        {
          title: "CHAPTER II: The Cipher Wheel",
          detective: {
            clue: "A cipher wheel with letters shifted. Message: 'Khoor, zruog'. (Looks like Caesar).",
            partial: "Shift value unknown."
          },
          analyst: {
            clue: "Dr. Voss’s calendar: 'Shift 3 for my favourite number'.",
            partial: "Decrypt with shift 3."
          },
          question: "Decoded message (lowercase, no punctuation):",
          answer: "hello world"
        },
        {
          title: "CHAPTER III: The Chemical Lock",
          detective: {
            clue: "Vial labeled 'Aqua Regia' and a note: 'Mix with Au to reveal safe word'.",
            partial: "Au is gold, but what’s the result?"
          },
          analyst: {
            clue: "Lab notes: Aqua Regia dissolves gold, producing chloroauric acid. Code: 'golden'.",
            partial: "The safe word is 'golden'."
          },
          question: "Safe word from chemical reaction:",
          answer: "golden"
        },
        {
          title: "CHAPTER IV: The Family Crest",
          detective: {
            clue: "Portrait of Voss family crest: a raven, a rose, and a sword. Motto: 'Sangue e Onore'.",
            partial: "Italian: Blood and Honour. But which name?"
          },
          analyst: {
            clue: "Census records: Voss ancestral name was 'Corvus' (Latin for raven). The rose points to Rosalind Voss.",
            partial: "The password is 'corvus'."
          },
          question: "Password from family crest:",
          answer: "corvus"
        },
        {
          title: "CHAPTER V: The Final Confession",
          detective: {
            clue: "Hidden letter signed 'E.V.' with coordinates: 48.8566° N, 2.3522° E.",
            partial: "Paris. E.V. could be Elara Voss?"
          },
          analyst: {
            clue: "Financial records: huge transfer to a 'E. Vance'. Vance is a known art thief.",
            partial: "Full name is Elias Vance."
          },
          question: "Who orchestrated the disappearance? (full name):",
          answer: "elias vance"
        }
      ];

      let currentChapter = 0;
      let myRole = null;
      let peer = null;
      let conn = null;
      let partnerReadyForNext = false;

      // UI elements
      const lobbyScreen = document.getElementById("lobbyScreen");
      const gameScreen = document.getElementById("gameScreen");
      const createBtn = document.getElementById("createRoomBtn");
      const joinBtn = document.getElementById("joinRoomBtn");
      const joinInput = document.getElementById("joinInput");
      const roomIdBox = document.getElementById("roomIdBox");
      const roomIdText = document.getElementById("roomIdText");
      const connectionStatusDiv = document.getElementById("connectionStatus");
      const roleLabel = document.getElementById("roleLabel");
      const partnerPill = document.getElementById("partnerConnectionPill");
      const chapterDisplay = document.getElementById("chapterDisplay");
      const cluesList = document.getElementById("cluesList");
      const puzzleQuestion = document.getElementById("puzzleQuestion");
      const answerInput = document.getElementById("answerInput");
      const submitBtn = document.getElementById("submitAnswerBtn");
      const resultDisplay = document.getElementById("resultDisplay");

      function updateConnectionStatus(text, className) {
        connectionStatusDiv.textContent = text;
        connectionStatusDiv.className = "status-pill " + (className || "");
      }

      // ---- PeerJS Setup ----
      function createPeerAndWait() {
        peer = new Peer();
        peer.on('open', (id) => {
          roomIdText.textContent = id;
          roomIdBox.classList.remove("hidden");
          updateConnectionStatus("Waiting for partner...", "waiting");
        });
        peer.on('connection', (incomingConn) => {
          conn = incomingConn;
          setupConnectionHandlers();
          myRole = ROLE_ANALYST; // Joiner (the one who receives connection) gets Analyst
          startGameAfterConnection();
        });
        peer.on('error', (err) => {
          updateConnectionStatus("Error: " + err, "");
        });
      }

      createBtn.addEventListener('click', () => {
        if (peer) peer.destroy();
        createPeerAndWait();
        myRole = ROLE_DETECTIVE; // Creator will be Detective
        updateConnectionStatus("Creating room...", "waiting");
      });

      joinBtn.addEventListener('click', () => {
        const roomId = joinInput.value.trim();
        if (!roomId) return;
        if (peer) peer.destroy();
        peer = new Peer();
        peer.on('open', () => {
          conn = peer.connect(roomId);
          setupConnectionHandlers();
          myRole = ROLE_ANALYST; // Joiner is Analyst
          updateConnectionStatus("Connecting...", "");
        });
        peer.on('error', (err) => {
          updateConnectionStatus("Join failed: " + err, "");
        });
      });

      function setupConnectionHandlers() {
        conn.on('open', () => {
          if (myRole === ROLE_DETECTIVE) {
            updateConnectionStatus("Partner connected!", "connected");
          } else {
            updateConnectionStatus("Connected to room", "connected");
          }
          partnerPill.textContent = "🟢 Partner online";
          partnerPill.classList.add("connected");
          // Both players are ready, start game screen
          startGameAfterConnection();
        });
        conn.on('data', (data) => {
          if (data.type === 'chapterSolved') {
            // Partner solved current chapter
            if (data.chapterIndex === currentChapter) {
              partnerReadyForNext = true;
              if (currentChapter < chapters.length - 1) {
                advanceChapter();
              } else {
                // Last chapter solved by partner
                showVictory();
              }
            }
          } else if (data.type === 'restartRequest') {
            resetGame();
          }
        });
        conn.on('close', () => {
          partnerPill.textContent = "🔴 Partner disconnected";
          partnerPill.classList.remove("connected");
        });
      }

      function startGameAfterConnection() {
        lobbyScreen.classList.add("hidden");
        gameScreen.classList.remove("hidden");
        roleLabel.textContent = myRole === ROLE_DETECTIVE ? "🕵️ Detective Miles (Study)" : "🔬 Analyst Cora (Lab)";
        loadChapter(currentChapter);
      }

      function loadChapter(index) {
        if (index >= chapters.length) {
          showVictory();
          return;
        }
        currentChapter = index;
        partnerReadyForNext = false;
        const ch = chapters[index];
        chapterDisplay.textContent = ch.title;
        const myClues = myRole === ROLE_DETECTIVE ? ch.detective : ch.analyst;
        cluesList.innerHTML = `<div class="clue-card">${myClues.clue}</div><div class="clue-card" style="border-left-color:#b8a04b;"><em>${myClues.partial}</em></div>`;
        puzzleQuestion.innerHTML = `<strong>❓ ${ch.question}</strong>`;
        answerInput.value = "";
        resultDisplay.textContent = "";
        resultDisplay.className = "result-message";
        answerInput.disabled = false;
        submitBtn.disabled = false;
        if (partnerReadyForNext) {
          resultDisplay.textContent = "Your partner already solved this. Awaiting your answer.";
          resultDisplay.className = "result-message";
        }
      }

      function advanceChapter() {
        currentChapter++;
        loadChapter(currentChapter);
      }

      submitBtn.addEventListener('click', () => {
        if (!conn || !conn.open) {
          resultDisplay.textContent = "Not connected to partner.";
          resultDisplay.className = "result-message error-message";
          return;
        }
        const ans = answerInput.value.trim().toLowerCase();
        const correctAnswer = chapters[currentChapter].answer;
        if (ans === correctAnswer) {
          // Correct! Send solved to partner
          conn.send({ type: 'chapterSolved', chapterIndex: currentChapter });
          resultDisplay.textContent = "✅ Correct! Advancing...";
          resultDisplay.className = "result-message success-message";
          answerInput.disabled = true;
          submitBtn.disabled = true;
          if (currentChapter === chapters.length - 1) {
            showVictory();
          } else {
            // Wait a moment, then advance if partner already solved, else wait
            setTimeout(() => {
              if (partnerReadyForNext) {
                advanceChapter();
              } else {
                resultDisplay.textContent = "Waiting for partner to solve...";
              }
            }, 1000);
          }
        } else {
          resultDisplay.textContent = "❌ Incorrect. Combine clues and try again.";
          resultDisplay.className = "result-message error-message";
        }
      });

      function showVictory() {
        gameScreen.innerHTML = `
          <div class="victory">
            <h2 style="color:#d4af37;">🏆 CASE CLOSED</h2>
            <p>You found Dr. Voss and exposed Elias Vance!</p>
            <p style="font-size:0.9rem;">Great teamwork, detectives.</p>
          </div>
        `;
        createConfetti();
      }

      function resetGame() {
        currentChapter = 0;
        partnerReadyForNext = false;
        gameScreen.innerHTML = ""; // will be rebuilt if needed, but simple restart would reconnect.
        location.reload(); // Easiest way to reset fully
      }

      function createConfetti() {
        const confettiContainer = document.createElement('div');
        confettiContainer.className = 'confetti';
        for (let i = 0; i < 60; i++) {
          const piece = document.createElement('div');
          piece.className = 'confetti-piece';
          piece.style.left = Math.random() * 100 + '%';
          piece.style.animationDelay = Math.random() * 2 + 's';
          piece.style.background = ['#d4af37','#e74c3c','#3498db','#2ecc71'][Math.floor(Math.random()*4)];
          piece.style.width = (Math.random()*8+6)+'px';
          piece.style.height = (Math.random()*8+6)+'px';
          piece.style.animationDuration = (Math.random()*3+2)+'s';
          confettiContainer.appendChild(piece);
        }
        document.body.appendChild(confettiContainer);
        setTimeout(() => confettiContainer.remove(), 5000);
      }

      // Initialize first peer for create (optional)
      // We'll let buttons handle peer creation
    })();
  </script>
</body>
</html>
